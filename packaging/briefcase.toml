[tool.briefcase]
project_name = "Yuki"
bundle = "com.yuki"
version = "0.5.1"
url = "https://github.com/sudhanshu/yuki"
license = "MIT"
author = "Sudhanshu Pandit"

[tool.briefcase.app.yuki]
formal_name = "Yuki"
description = "Jarvis-style assistant for macOS that knows you"
sources = ["yuki"]
icon = "packaging/icon"

[tool.briefcase.app.yuki.macOS]
universal_build = true
min_os_version = "12.0"
requires = [
    "anthropic>=0.68.1",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sse-starlette>=2.1.0",
    "pydantic>=2.9.0",
    "pyyaml>=6.0.2",
    "python-frontmatter>=1.1.0",
    "sqlite-vec>=0.1.6",
    "voyageai>=0.3.2",
    "jinja2>=3.1.4",
    "croniter>=2.0.5",
    "pyobjc-framework-Cocoa>=10.1",
    "pyobjc-framework-Quartz>=10.1",
    "pyobjc-framework-EventKit>=10.1",
    "pyobjc-framework-Contacts>=10.1",
    "pyobjc-framework-CoreWLAN>=10.1",
]
